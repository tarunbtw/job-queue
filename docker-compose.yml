version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=${REDIS_URL}
      - DB_PATH=/app/data/jobs.db
    volumes:
      - job-data:/app/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_URL=${REDIS_URL}
      - DB_PATH=/app/data/jobs.db
    volumes:
      - job-data:/app/data
    depends_on:
      - server

volumes:
  job-data: